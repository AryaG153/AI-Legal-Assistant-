<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(226, 232, 240, 0.5);
        }
        .gradient-mesh {
            background-color: #131b2e;
            background-image: 
                radial-gradient(at 0% 0%, rgba(254, 166, 25, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(133, 83, 0, 0.15) 0px, transparent 50%);
        }
    </style>

<body class="bg-surface text-on-surface font-body-md">
<main class="flex min-h-screen w-full justify-center">
<!-- Left Side: Login Form (Canvas) -->
<section class="flex flex-col justify-center items-center px-margin-mobile md:px-margin-desktop bg-surface z-10">
<div class="w-full max-w-[480px]"><div class="flex justify-end mb-6"><div class="relative group"><button class="flex items-center gap-2 px-3 py-1.5 rounded-lg border border-outline-variant text-label-sm text-on-surface-variant hover:bg-surface-container transition-colors"><span class="material-symbols-outlined text-lg">language</span><span class="">English</span><span class="material-symbols-outlined text-lg">expand_more</span></button><div class="absolute right-0 mt-2 w-32 bg-surface-container-lowest border border-outline-variant rounded-lg shadow-xl hidden group-hover:block z-50"><div class="py-1"><a class="block px-4 py-2 text-label-sm text-on-surface hover:bg-surface-container" href="#">English</a><a class="block px-4 py-2 text-label-sm text-on-surface hover:bg-surface-container" href="#">Hindi</a><a class="block px-4 py-2 text-label-sm text-on-surface hover:bg-surface-container" href="#">Marathi</a></div></div></div></div>
<!-- Brand Anchor -->
<div class="mb-12 flex items-center gap-3">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="gavel" style="font-variation-settings: 'FILL' 1;">gavel</span>
<h1 class="text-headline-md font-headline-md text-primary tracking-tight">NyayaAI</h1>
</div>
<div class="space-y-2 mb-10">
<h2 class="text-display-lg-mobile md:text-display-lg font-display-lg text-primary">Welcome back</h2>
<p class="text-body-lg text-on-surface-variant">Access your digital legal guardian.</p>
</div>
<div class="glass-panel p-base md:p-gutter rounded-xl shadow-sm">
<form action="#" class="space-y-6" onsubmit="event.preventDefault();">
<!-- Full Name -->
<div class="space-y-2">
<label class="block text-label-sm font-label-sm text-on-surface-variant uppercase" for="name">Full Name</label>
<div class="relative group">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline group-focus-within:text-secondary transition-colors" data-icon="person">person</span>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container rounded-lg border-transparent focus:border-secondary focus:ring-2 focus:ring-secondary/20 transition-all outline-none text-body-md" id="name" placeholder="Enter your full name" type="text">
</div>
</div>
<!-- Email -->
<div class="space-y-2">
<label class="block text-label-sm font-label-sm text-on-surface-variant uppercase" for="email">Email Address</label>
<div class="relative group">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline group-focus-within:text-secondary transition-colors" data-icon="mail">mail</span>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container rounded-lg border-transparent focus:border-secondary focus:ring-2 focus:ring-secondary/20 transition-all outline-none text-body-md" id="email" placeholder="name@company.com" type="email">
</div>
</div>
<!-- Password -->
<div class="space-y-2">
<label class="block text-label-sm font-label-sm text-on-surface-variant uppercase" for="password">Password</label>
<div class="relative group">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline group-focus-within:text-secondary transition-colors" data-icon="lock">lock</span>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container rounded-lg border-transparent focus:border-secondary focus:ring-2 focus:ring-secondary/20 transition-all outline-none text-body-md" id="password" placeholder="••••••••" type="password">
</div>
</div>
<div class="flex items-center justify-between pt-2">
<label class="flex items-center gap-2 cursor-pointer">
<input class="w-5 h-5 rounded border-outline text-secondary focus:ring-secondary" type="checkbox">
<span class="text-label-sm text-on-surface-variant">Remember me</span>
</label>
<a class="text-label-sm text-secondary hover:underline font-semibold" href="#">Forgot Password?</a>
</div>
<div class="flex flex-col gap-4 pt-4">
<!-- Primary Login -->
<a href="dashboard.html" class="w-full py-4 bg-primary text-on-primary font-button rounded-lg hover:opacity-90 active:scale-95 transition-all shadow-sm flex items-center justify-center gap-2">Login to Account</a>
<div class="relative flex items-center py-2">
<div class="flex-grow border-t border-outline-variant/30"></div>
<span class="flex-shrink mx-4 text-label-sm text-outline uppercase">or</span>
<div class="flex-grow border-t border-outline-variant/30"></div>
</div>
<!-- Social / Guest Actions -->
<div class="flex flex-col gap-4">
<a href="dashboard.html" class="py-3 border border-outline-variant rounded-lg font-button text-on-surface hover:bg-surface-container transition-colors flex items-center justify-center gap-2 py-4"><span class="material-symbols-outlined text-lg" data-icon="person_add">person_add</span>Sign Up</a>
<a href="dashboard.html" class="col-span-2 py-4 border-2 border-secondary text-secondary font-button rounded-lg hover:bg-secondary/5 active:scale-95 transition-all flex items-center justify-center gap-2"><span class="material-symbols-outlined text-lg">visibility</span>Continue as Guest</a>
</div>
</div>
</form>
</div>
<p class="mt-8 text-center text-label-sm text-on-surface-variant">
                    By continuing, you agree to NyayaAI's 
                    <a class="text-secondary hover:underline" href="#">Terms of Service</a> and 
                    <a class="text-secondary hover:underline" href="#">Privacy Policy</a>.
                </p>
</div>
</section>
<!-- Right Side: Visual Content (Branding) -->
</main>
<!-- Background Subtle Grain Effect -->
<div class="fixed inset-0 pointer-events-none opacity-[0.03] mix-blend-overlay">
<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
<filter id="noiseFilter">
<feTurbulence baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" type="fractalNoise"></feTurbulence>
</filter>
<rect filter="url(#noiseFilter)" height="100%" width="100%"></rect>
</svg>
</div>
<script>
        // Simple input focus micro-interaction
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.closest('.glass-panel').classList.add('shadow-md');
                input.parentElement.closest('.glass-panel').style.borderColor = 'rgba(133, 83, 0, 0.2)';
            });
            input.addEventListener('blur', () => {
                input.parentElement.closest('.glass-panel').classList.remove('shadow-md');
                input.parentElement.closest('.glass-panel').style.borderColor = 'rgba(226, 232, 240, 0.5)';
            });
        });
    </script>
